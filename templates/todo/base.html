<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #b648c7);
            min-height: 100vh;
            color: #333;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 20px;
            color: white;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        }

        .navbar {
            background: rgba(0,0,0,0.3) !important;
            backdrop-filter: blur(10px);
        }

        .task-item {
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .task-item:hover {
            transform: scale(1.02);
            background: rgba(255,255,255,0.3);
        }

        .btn-custom {
            border-radius: 10px;
        }

        .badge {
            font-size: 0.75rem;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark px-4">
    <span class="navbar-brand fw-bold">✨ MyTasks</span>

    {% if request.user.is_authenticated %}
        <div class="text-white">
            <i class="bi bi-person-circle"></i> {{ request.user.username }} |
            <a href="{% url 'logout' %}" class="text-warning text-decoration-none">Logout</a>
        </div>
    {% endif %}
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
