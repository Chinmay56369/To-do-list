{% extends 'todo/base.html' %}
{% block content %}

<div class="glass-card mx-auto" style="max-width: 500px;">
    <h4><i class="bi bi-pencil-square"></i> Edit Task</h4>

    <form method="POST">
        {% csrf_token %}

        <input class="form-control mb-3" type="text" name="title" value="{{ task.title }}" required>

        <input class="form-control mb-3" type="date" name="due_date" value="{{ task.due_date|date:'Y-m-d' }}">

        <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" name="completed" {% if task.completed %}checked{% endif %}>
            <label class="form-check-label">Completed</label>
        </div>

        <button class="btn btn-light w-100 btn-custom">Update</button>
    </form>
</div>

{% endblock %}
